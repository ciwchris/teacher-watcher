name: Check teacher postings

on:
  # 21:00 UTC = 2:00 PM Pacific (PDT, Mar–Nov) / 1:00 PM Pacific (PST, Nov–Mar).
  # GitHub cron is always UTC and does not follow daylight saving time.
  # Note: GitHub may delay scheduled runs by 10–60+ minutes during peak load.
  schedule:
    - cron: "0 21 * * *"
  # Lets you run it on demand from the Actions tab (great for the first test).
  workflow_dispatch:

# Allow the workflow to commit the updated seen.json back to the repo.
permissions:
  contents: write

# If a manual run overlaps the scheduled one, don't pile up.
concurrency:
  group: teacher-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run check
        id: check
        run: node check.mjs

      - name: Send email
        if: steps.check.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Teacher Job Watch <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.check.outputs.subject }}
          html_body: file://email_body.html

      - name: Commit updated state
        run: |
          git add seen.json
          # --cached compares the staged file against HEAD, so this detects a
          # brand-new seen.json (first run) as well as later modifications.
          if git diff --cached --quiet; then
            echo "No change to seen.json."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Update seen postings [skip ci]"
            git push
          fi
